<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopTheCircular</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f3f4f3;min-height:100vh;color:#1a1a2e;}

/* ── Zip modal ───────────────────────────────────────────────────────────── */
.zip-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
.zip-modal{background:white;border-radius:16px;padding:32px 28px;width:100%;max-width:380px;box-shadow:0 12px 40px rgba(0,0,0,0.2);}
.zip-logo{font-size:22px;font-weight:800;color:#1a1a2e;margin-bottom:4px;}
.zip-logo span{color:#22863a;}
.zip-title{font-size:16px;color:#555;margin-bottom:20px;line-height:1.5;}
.zip-row{display:flex;gap:8px;}
.zip-input{flex:1;padding:12px 14px;font-size:16px;border:1.5px solid #ddd;border-radius:10px;outline:none;min-width:0;}
.zip-input:focus{border-color:#1a1a2e;}
.zip-go{padding:12px 20px;background:#1a1a2e;color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;}
.zip-go:hover{background:#2d2d4e;}
.zip-go:disabled{opacity:0.5;cursor:default;}
.zip-err{font-size:12px;color:#e53e3e;margin-top:8px;}

/* ── Loading screen ──────────────────────────────────────────────────────── */
#loading-screen{position:fixed;inset:0;background:white;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:24px;}
.load-logo{font-size:26px;font-weight:800;color:#1a1a2e;margin-bottom:6px;}
.load-logo span{color:#22863a;}
.load-sub{font-size:14px;color:#888;margin-bottom:32px;}
.load-spinner{width:48px;height:48px;border:4px solid #e8e8e8;border-top-color:#22863a;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:28px;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-log{width:100%;max-width:480px;max-height:240px;overflow-y:auto;font-size:12px;color:#555;line-height:1.9;font-family:monospace;background:#f8f9f8;border-radius:10px;padding:14px 16px;}
.load-log p{border-bottom:1px solid #eee;padding-bottom:4px;margin-bottom:4px;}
.load-log p:last-child{border:none;margin:0;padding:0;color:#22863a;font-weight:600;}

/* ── App shell ───────────────────────────────────────────────────────────── */
#app{display:flex;flex-direction:column;min-height:100vh;}

/* ── Header ──────────────────────────────────────────────────────────────── */
.header{background:#1a1a2e;padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;flex-wrap:wrap;}
.h-logo{font-size:18px;font-weight:800;color:white;white-space:nowrap;flex-shrink:0;}
.h-logo span{color:#4ade80;}
.h-search{flex:1;min-width:160px;position:relative;}
.h-search input{width:100%;padding:9px 14px 9px 36px;border-radius:22px;border:none;background:rgba(255,255,255,0.12);color:white;font-size:14px;outline:none;}
.h-search input::placeholder{color:rgba(255,255,255,0.45);}
.h-search input:focus{background:rgba(255,255,255,0.2);}
.h-search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;opacity:0.6;}
.h-loc{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);font-size:12px;padding:6px 12px;border-radius:20px;cursor:pointer;border:none;white-space:nowrap;flex-shrink:0;}
.h-loc:hover{background:rgba(255,255,255,0.22);}

/* ── Sort bar ────────────────────────────────────────────────────────────── */
.sort-bar{display:flex;align-items:center;gap:8px;padding:12px 20px;background:white;border-bottom:1px solid #e8e8e8;flex-wrap:wrap;}
.sort-label{font-size:12px;color:#888;font-weight:500;white-space:nowrap;}
.sort-btn{padding:6px 14px;border-radius:20px;border:1.5px solid #ddd;background:white;font-size:12px;font-weight:600;color:#555;cursor:pointer;transition:all 0.12s;}
.sort-btn:hover{border-color:#999;}
.sort-btn.active{background:#1a1a2e;color:white;border-color:#1a1a2e;}
.stores-found{margin-left:auto;font-size:12px;color:#888;}

/* ── Store rows ──────────────────────────────────────────────────────────── */
.stores-container{padding:16px 20px;display:flex;flex-direction:column;gap:16px;flex:1;}

.store-row{background:white;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.07);transition:box-shadow 0.15s;}
.store-row:hover{box-shadow:0 3px 14px rgba(0,0,0,0.10);}

.store-header{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid #f2f2f2;cursor:default;}
.store-logo{width:46px;height:46px;border-radius:8px;object-fit:contain;background:#f5f5f5;flex-shrink:0;border:1px solid #eee;}
.store-logo-fallback{width:46px;height:46px;border-radius:8px;background:#1a1a2e;color:white;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0;}
.store-info{flex:1;min-width:0;}
.store-name{font-size:15px;font-weight:700;color:#1a1a2e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.store-meta{font-size:11px;color:#aaa;margin-top:2px;}
.store-total{flex-shrink:0;text-align:right;}
.total-pill{display:inline-flex;flex-direction:column;align-items:flex-end;background:#f0faf0;border:1.5px solid #22863a;border-radius:10px;padding:5px 11px;}
.total-amount{font-size:15px;font-weight:800;color:#22863a;line-height:1;}
.total-label{font-size:9px;color:#22863a;opacity:0.8;margin-top:2px;text-transform:uppercase;letter-spacing:0.04em;}

/* ── Item scroll container ───────────────────────────────────────────────── */
.items-scroll{display:flex;gap:10px;padding:12px 18px 14px;overflow-x:auto;scrollbar-width:thin;scrollbar-color:#ddd transparent;-webkit-overflow-scrolling:touch;}
.items-scroll::-webkit-scrollbar{height:4px;}
.items-scroll::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px;}

/* ── Item card ───────────────────────────────────────────────────────────── */
.item-card{flex-shrink:0;width:158px;background:white;border:1.5px solid #e8e8e8;border-radius:12px;overflow:hidden;display:flex;flex-direction:column;transition:box-shadow 0.12s,border-color 0.12s;position:relative;}
.item-card:hover{box-shadow:0 4px 14px rgba(0,0,0,0.10);border-color:#ccc;}
.item-card.in-basket{border-color:#22863a;border-width:2px;}

.item-img-wrap{width:100%;height:138px;background:#f8f8f8;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;flex-shrink:0;}
.item-img-wrap img{width:100%;height:100%;object-fit:contain;padding:8px;}
.item-img-fallback{font-size:40px;opacity:0.25;}

.disc-badge{position:absolute;top:6px;left:6px;background:#e53e3e;color:white;font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;letter-spacing:0.02em;}

.add-btn{position:absolute;bottom:8px;right:8px;width:32px;height:32px;background:#1a1a2e;color:white;border:none;border-radius:50%;font-size:22px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,0.2);transition:background 0.12s,transform 0.1s;}
.add-btn:hover{background:#22863a;transform:scale(1.08);}

.qty-ctrl{position:absolute;bottom:8px;right:6px;display:flex;align-items:center;background:white;border:2px solid #22863a;border-radius:16px;overflow:hidden;}
.qty-btn{width:28px;height:28px;background:none;border:none;color:#22863a;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;padding:0;}
.qty-btn:hover{background:#f0faf0;}
.qty-num{font-size:13px;font-weight:800;color:#22863a;min-width:18px;text-align:center;}

.item-body{padding:8px 10px 10px;flex:1;display:flex;flex-direction:column;}
.item-prices{display:flex;align-items:baseline;gap:5px;margin-bottom:4px;}
.item-price{font-size:16px;font-weight:800;color:#1a1a2e;}
.item-was{font-size:11px;color:#bbb;text-decoration:line-through;}
.item-name{font-size:11px;color:#333;line-height:1.35;flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.item-brand{font-size:10px;color:#aaa;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── No results ──────────────────────────────────────────────────────────── */
.no-results{text-align:center;padding:60px 20px;color:#aaa;font-size:15px;}

/* ── Responsive ──────────────────────────────────────────────────────────── */
@media(max-width:600px){
  .stores-container{padding:12px;}
  .header{padding:10px 14px;}
  .sort-bar{padding:10px 14px;}
}
</style>
</head>
<body>

<!-- ── Zip modal ─────────────────────────────────────────────────────────── -->
<div class="zip-overlay" id="zipOverlay">
  <div class="zip-modal">
    <div class="zip-logo">Shop<span>TheCircular</span></div>
    <div class="zip-title">Enter your zip code to see this week's grocery deals near you.</div>
    <div class="zip-row">
      <input class="zip-input" id="zipInput" type="text" inputmode="numeric" maxlength="5" placeholder="e.g. 11435" onkeydown="if(event.key==='Enter')submitZip()">
      <button class="zip-go" id="zipGo" onclick="submitZip()">Go</button>
    </div>
    <div class="zip-err" id="zipErr" style="display:none"></div>
  </div>
</div>

<!-- ── Loading / scraping screen ─────────────────────────────────────────── -->
<div id="loading-screen" style="display:none">
  <div class="load-logo">Shop<span>TheCircular</span></div>
  <div class="load-sub" id="loadSub">Finding grocery deals near you...</div>
  <div class="load-spinner"></div>
  <div class="load-log" id="loadLog"></div>
</div>

<!-- ── Main app ───────────────────────────────────────────────────────────── -->
<div id="app" style="display:none">
  <header class="header">
    <div class="h-logo">Shop<span>TheCircular</span></div>
    <div class="h-search">
      <span class="h-search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search items across all stores..." oninput="onSearch()">
    </div>
    <button class="h-loc" id="locBtn" onclick="showZipModal()">📍 —</button>
  </header>

  <div class="sort-bar">
    <span class="sort-label">Sort by:</span>
    <button class="sort-btn active" id="sort-deals"  onclick="setSort('deals')">🔥 Best Deals</button>
    <button class="sort-btn"        id="sort-az"     onclick="setSort('az')">A–Z</button>
    <span class="stores-found" id="storesFound"></span>
  </div>

  <div class="stores-container" id="storesContainer"></div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────
let state = {
  zip:     null,
  stores:  [],          // full store+item data from API
  sortBy:  'deals',
  search:  '',
  basket:  {},          // storeId (flyer_id) → Map(itemId → qty)
};

// ── Zip modal ─────────────────────────────────────────────────────────────
async function submitZip() {
  const zip = document.getElementById('zipInput').value.trim();
  if (!/^\d{5}$/.test(zip)) { showZipErr('Please enter a valid 5-digit zip code.'); return; }
  const btn = document.getElementById('zipGo');
  btn.textContent = '…'; btn.disabled = true;
  hideZipErr();
  hideZipModal();
  state.zip = zip;
  localStorage.setItem('userZip', zip);
  document.getElementById('locBtn').textContent = `📍 ${zip}`;
  await loadData(zip);
  btn.textContent = 'Go'; btn.disabled = false;
}
function showZipModal() {
  document.getElementById('zipOverlay').style.display = 'flex';
  document.getElementById('zipInput').value = state.zip || localStorage.getItem('userZip') || '';
  hideZipErr();
  setTimeout(() => document.getElementById('zipInput').focus(), 50);
}
function hideZipModal()  { document.getElementById('zipOverlay').style.display = 'none'; }
function showZipErr(m)   { const e=document.getElementById('zipErr');e.textContent=m;e.style.display='block'; }
function hideZipErr()    { document.getElementById('zipErr').style.display='none'; }

// ── Data loading ──────────────────────────────────────────────────────────
async function loadData(zip) {
  showLoading(`Finding grocery deals near ${zip}…`);
  try {
    const res = await fetch(`/api/circulars?zip=${zip}`);
    if (res.ok) {
      const data = await res.json();
      hideLoading();
      applyData(data);
      return;
    }
    if (res.status === 202) {
      // Need to scrape — connect SSE
      await runScrape(zip);
      return;
    }
    throw new Error(`Server returned ${res.status}`);
  } catch (e) {
    hideLoading();
    alert('Could not load deals: ' + e.message);
  }
}

function runScrape(zip) {
  return new Promise((resolve, reject) => {
    logToScreen(`🔍 Searching for grocery stores near ${zip}…`);
    const es = new EventSource(`/api/scrape?zip=${zip}`);

    es.addEventListener('log', e => {
      const { message } = JSON.parse(e.data);
      logToScreen(message);
    });

    es.addEventListener('done', async e => {
      es.close();
      logToScreen('✅ Done! Loading results…');
      // Short pause so user sees the done message
      await new Promise(r => setTimeout(r, 600));
      try {
        const res = await fetch(`/api/circulars?zip=${zip}`);
        const data = await res.json();
        hideLoading();
        applyData(data);
        resolve();
      } catch (err) {
        hideLoading();
        reject(err);
      }
    });

    es.addEventListener('error', e => {
      es.close();
      let msg = 'Unknown error';
      try { msg = JSON.parse(e.data).message; } catch {}
      hideLoading();
      reject(new Error(msg));
    });
  });
}

function applyData(data) {
  state.stores = (data.stores || []).filter(s => s.item_count > 0);
  state.zip    = data.zip;
  document.getElementById('locBtn').textContent = `📍 ${data.zip}`;
  renderApp();
}

// ── Loading screen ────────────────────────────────────────────────────────
function showLoading(sub) {
  document.getElementById('app').style.display = 'none';
  document.getElementById('zipOverlay').style.display = 'none';
  document.getElementById('loading-screen').style.display = 'flex';
  document.getElementById('loadSub').textContent = sub || 'Loading…';
  document.getElementById('loadLog').innerHTML = '';
}
function hideLoading() {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
}
function logToScreen(msg) {
  const log = document.getElementById('loadLog');
  const p = document.createElement('p');
  p.textContent = msg;
  log.appendChild(p);
  log.scrollTop = log.scrollHeight;
}

// ── Sorting ───────────────────────────────────────────────────────────────
function setSort(by) {
  state.sortBy = by;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b.id === 'sort-' + by));
  renderStores();
}

function sortedStores(stores) {
  const list = [...stores];
  if (state.sortBy === 'deals') {
    // Average discount across items (higher = better deals)
    list.sort((a, b) => {
      const avgDisc = s => {
        const items = s.items.filter(i => i.discount_pct > 0);
        if (!items.length) return 0;
        return items.reduce((sum, i) => sum + i.discount_pct, 0) / items.length;
      };
      return avgDisc(b) - avgDisc(a);
    });
  } else if (state.sortBy === 'az') {
    list.sort((a, b) => a.name.localeCompare(b.name));
  }
  return list;
}

// ── Search ────────────────────────────────────────────────────────────────
function onSearch() {
  state.search = document.getElementById('searchInput').value.toLowerCase().trim();
  renderStores();
}

function filteredItems(items) {
  if (!state.search) return items;
  return items.filter(i =>
    i.name.toLowerCase().includes(state.search) ||
    (i.brand || '').toLowerCase().includes(state.search)
  );
}

// ── Basket ────────────────────────────────────────────────────────────────
function getQty(storeId, itemId) {
  return state.basket[storeId]?.get(itemId) || 0;
}
function setQty(storeId, itemId, qty) {
  if (!state.basket[storeId]) state.basket[storeId] = new Map();
  if (qty <= 0) state.basket[storeId].delete(itemId);
  else          state.basket[storeId].set(itemId, qty);
  refreshStoreTotal(storeId);
  refreshCard(storeId, itemId);
}
function addItem(storeId, itemId) {
  setQty(storeId, itemId, getQty(storeId, itemId) + 1);
}
function decItem(storeId, itemId) {
  setQty(storeId, itemId, getQty(storeId, itemId) - 1);
}
function getStoreTotal(storeId) {
  const store = state.stores.find(s => s.flyer_id === storeId);
  if (!store || !state.basket[storeId]) return 0;
  let total = 0;
  state.basket[storeId].forEach((qty, itemId) => {
    const item = store.items.find(i => String(i.id) === String(itemId));
    if (item) total += item.current_price * qty;
  });
  return total;
}
function getBasketCount(storeId) {
  if (!state.basket[storeId]) return 0;
  let n = 0;
  state.basket[storeId].forEach(qty => n += qty);
  return n;
}

// ── Render ────────────────────────────────────────────────────────────────
function renderApp() {
  document.getElementById('storesFound').textContent =
    `${state.stores.length} store${state.stores.length !== 1 ? 's' : ''} near ${state.zip}`;
  renderStores();
}

function renderStores() {
  const sorted = sortedStores(state.stores);
  const container = document.getElementById('storesContainer');

  // Filter stores with matching items if searching
  const visible = state.search
    ? sorted.filter(s => filteredItems(s.items).length > 0)
    : sorted;

  if (!visible.length) {
    container.innerHTML = `<div class="no-results">No results found for "<strong>${state.search}</strong>"</div>`;
    return;
  }

  container.innerHTML = visible.map(store => storeRowHTML(store)).join('');
}

function storeRowHTML(store) {
  const storeId = store.flyer_id;
  const items   = filteredItems(store.items);
  const total   = getStoreTotal(storeId);
  const count   = getBasketCount(storeId);
  const validTo = store.valid_to ? new Date(store.valid_to).toLocaleDateString('en-US', { month:'short', day:'numeric' }) : '';

  const logoHTML = store.logo_url
    ? `<img class="store-logo" src="${store.logo_url}" alt="${store.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    : '';
  const fallbackHTML = `<div class="store-logo-fallback" style="${store.logo_url?'display:none':''}">${store.name.charAt(0)}</div>`;

  const totalHTML = total > 0
    ? `<div class="store-total">
        <div class="total-pill">
          <div class="total-amount">$${total.toFixed(2)}</div>
          <div class="total-label">${count} item${count!==1?'s':''}</div>
        </div>
      </div>`
    : '';

  const itemsHTML = items.slice(0, 40).map(item => itemCardHTML(item, storeId)).join('');

  return `<div class="store-row" id="store-${storeId}">
    <div class="store-header">
      ${logoHTML}${fallbackHTML}
      <div class="store-info">
        <div class="store-name">${store.name}</div>
        <div class="store-meta">${store.item_count} deals${validTo ? ` · Valid until ${validTo}` : ''}</div>
      </div>
      ${totalHTML}
    </div>
    <div class="items-scroll" id="scroll-${storeId}">
      ${itemsHTML}
    </div>
  </div>`;
}

function itemCardHTML(item, storeId) {
  const itemId = String(item.id);
  const qty    = getQty(storeId, itemId);
  const inBasket = qty > 0;

  const imgHTML = item.image_url
    ? `<img src="${item.image_url}" alt="${item.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">`
    : '';
  const fallbackEmoji = `<div class="item-img-fallback" style="${item.image_url?'display:none':''}">🛒</div>`;

  const discHTML = item.discount_pct > 0
    ? `<div class="disc-badge">${item.discount_pct}% OFF</div>`
    : '';

  const ctrlHTML = inBasket
    ? `<div class="qty-ctrl">
        <button class="qty-btn" onclick="event.stopPropagation();decItem('${storeId}','${itemId}')">−</button>
        <span class="qty-num">${qty}</span>
        <button class="qty-btn" onclick="event.stopPropagation();addItem('${storeId}','${itemId}')">+</button>
      </div>`
    : `<button class="add-btn" onclick="event.stopPropagation();addItem('${storeId}','${itemId}')">+</button>`;

  const wasHTML = item.regular_price && item.regular_price > item.current_price
    ? `<span class="item-was">$${item.regular_price.toFixed(2)}</span>`
    : '';

  return `<div class="item-card${inBasket?' in-basket':''}" id="card-${storeId}-${itemId}">
    <div class="item-img-wrap">
      ${imgHTML}${fallbackEmoji}
      ${discHTML}
      ${ctrlHTML}
    </div>
    <div class="item-body">
      <div class="item-prices">
        <span class="item-price">$${item.current_price.toFixed(2)}</span>
        ${wasHTML}
      </div>
      <div class="item-name">${item.name}</div>
      ${item.brand ? `<div class="item-brand">${item.brand}</div>` : ''}
    </div>
  </div>`;
}

// ── Targeted refresh (avoid full re-render on add/remove) ─────────────────
function refreshCard(storeId, itemId) {
  const el = document.getElementById(`card-${storeId}-${itemId}`);
  if (!el) return;
  const store = state.stores.find(s => s.flyer_id === storeId);
  const item  = store?.items.find(i => String(i.id) === String(itemId));
  if (!item) return;
  el.outerHTML = itemCardHTML(item, storeId);
}

function refreshStoreTotal(storeId) {
  const row = document.getElementById(`store-${storeId}`);
  if (!row) return;
  const header = row.querySelector('.store-header');
  if (!header) return;

  // Remove old total
  const old = header.querySelector('.store-total');
  if (old) old.remove();

  const total = getStoreTotal(storeId);
  const count = getBasketCount(storeId);
  if (total > 0) {
    const div = document.createElement('div');
    div.className = 'store-total';
    div.innerHTML = `<div class="total-pill">
      <div class="total-amount">$${total.toFixed(2)}</div>
      <div class="total-label">${count} item${count!==1?'s':''}</div>
    </div>`;
    header.appendChild(div);
  }
}

// ── Init ──────────────────────────────────────────────────────────────────
(async () => {
  const savedZip = localStorage.getItem('userZip');
  if (savedZip) {
    state.zip = savedZip;
    document.getElementById('locBtn').textContent = `📍 ${savedZip}`;
    document.getElementById('zipInput').value = savedZip;
    await loadData(savedZip);
  } else {
    showZipModal();
  }
})();
</script>
</body>
</html>
